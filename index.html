<!doctype html>
<html lang="en">

<head>
  <title>Bey API - Simple Call Example</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
    integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body class="call-page">
  <div id="main-content">
  <div class="container">
    <div class="row">
      <div class="col-md-12">
        <div id="participants-area"></div>
        <div class="controls-section">
          <div id="actions-area">
            <button id="start-call-button" class="btn btn-primary btn-lg" type="button"
              onclick="appActions.startCall()">
              Start Call
            </button>
            <div class="call-controls">
              <button id="disconnect-button" class="btn btn-danger" disabled type="button"
                onclick="appActions.disconnect()">
                End Call
              </button>
            </div>
          </div>


        </div>
      </div>

    </div>
  </div>
  </div>
  <script src="./demo.ts" type="module"></script>
  <script>
    function initAfterAuth() {
      const params = new URLSearchParams(window.location.search);
      const nameFromUrl = (params.get('name') || '').trim();
      if (nameFromUrl) {
        localStorage.setItem('matchedUserName', nameFromUrl);
        localStorage.setItem('matchedWebhookVariables', JSON.stringify({
          name: nameFromUrl,
          user_name: nameFromUrl,
          userName: nameFromUrl,
        }));
      }
      const startButton = document.getElementById('start-call-button');
      if (startButton) setTimeout(() => startButton.click(), 300);
    }
    window.addEventListener('load', initAfterAuth);
  </script>
</body>

</html>
