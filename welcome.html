<!doctype html>
<html lang="en" class="welcome-page">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Welcome</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500&family=Plus+Jakarta+Sans:wght@500;700&family=Poppins:wght@300;500;600;700&display=swap"
      rel="stylesheet" />
    <link href="/styles/main.css" rel="stylesheet" />
  </head>

  <body class="welcome-page">
    <audio
      id="eva-chroma-audio"
      autoplay
      playsinline
      class="hidden-deps"></audio>
    <main aria-label="Welcome">
      <div class="preview-cont">
        <img class="brand-logo" src="/media/hdfc-logo.svg" alt="HDFC Bank" />
        <h1 class="title">Digital Banking Unit</h1>
        <p class="subtitle">Smart way to your banking experience</p>
        <section class="welcome-copy" id="welcome-copy">
          <p class="welcome-line" id="welcome-line">Welcome!</p>
          <h2 class="eva-line">I am Eva</h2>
          <p class="assist-line">Your All New Smart AI Assistant.</p>
        </section>
        <p class="help-line" id="help-line">How may I help you today?</p>
        <section class="eva-frame">
          <div id="participants-area">
            <div class="participants-area-eva">
              <div class="media-wrapper">
                <div class="eva-stage">
                  <video
                    id="fx-video-source"
                    class="fx-video-source"
                    src="/ui/fx.mp4"
                    autoplay
                    loop
                    muted
                    playsinline></video>
                  <canvas id="fx-canvas" class="fx-under-eva"></canvas>
                  <video
                    class="fx-layer fx-underlay"
                    src="/ui/fx.mp4"
                    autoplay
                    loop
                    muted
                    playsinline></video>
                  <div class="eva-static-layer">
                    <canvas
                      id="eva-static-canvas"
                      class="eva-canvas eva-static-canvas"
                      width="1280"
                      height="720"></canvas>
                  </div>
                  <div class="eva-agent-layer">
                    <canvas
                      id="eva-canvas"
                      class="eva-canvas eva-live-canvas"
                      width="1280"
                      height="720"></canvas>
                  </div>
                  <video
                    class="fx-layer fx-overlay"
                    src="/ui/fx.mp4"
                    autoplay
                    loop
                    muted
                    playsinline></video>
                </div>
              </div>
            </div>
          </div>
          <img
            id="eva-static-source"
            src="/ui/eva_static.jpg"
            alt=""
            style="display: none" />
          <video
            id="eva-chroma-source"
            autoplay
            muted
            playsinline
            class="hidden-deps"></video>
          <canvas id="eva-chroma-canvas" style="display: none"></canvas>
        </section>
        <div class="bottom-card">
          <div class="date-text" id="transcription-display"></div>
          <div class="orb-container">
            <img
              id="orb-blob"
              src="/ui/blob-listening.gif"
              alt="Blob"
              class="orb-gif" />
          </div>
        </div>
      </div>

      <div class="controls-section">
        <div id="actions-area">
          <button
            id="start-call-button"
            class="btn-primary btn-icon"
            type="button"
            onclick="appActions.startCall()"
            aria-label="Start Call">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2">
              <path
                d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />
            </svg>
          </button>
          <button
            id="disconnect-button"
            class="btn-danger btn-icon"
            disabled
            type="button"
            onclick="appActions.disconnect()"
            aria-label="End Call">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2">
              <path
                d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />
              <line x1="2" y1="2" x2="22" y2="22" />
            </svg>
          </button>
          <button
            id="open-journey-button"
            class="btn-primary btn-icon"
            type="button"
            aria-label="Open Journey Screen"
            title="Open Journey Screen">
            Open Journey
          </button>
        </div>
      </div>
    </main>
    <textarea id="chat" style="display: none"></textarea>

    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const role = params.get("role") || "avatar";
        window.DEMOPAGEROLE = "avatar";
       window.DEMOTWOTAB = true;
      })();
    </script>
    <script>
      document
        .getElementById("open-journey-button")
        ?.addEventListener("click", () => {
          const params = new URLSearchParams(window.location.search);
          const session = params.get("session") || crypto.randomUUID();
          params.set("session", session);
          history.replaceState(
            {},
            "",
            `${window.location.pathname}?${params.toString()}`,
          );
          const url = `journey-screen.html?session=${encodeURIComponent(session)}&role=journey&twoTab=1`;
          window.open(url, "journey-screen", "noopener,noreferrer");
        });
    </script>
    <script>
      (function () {
        const carousel = document.getElementById("welcome-cards-carousel");
        const wraps = Array.from(
          document.querySelectorAll("#welcome-cards-carousel .card-wrap"),
        );
        const titlePill = document.querySelector(
          ".welcome-final-card .title-pill",
        );
        const positions = ["pos-left", "pos-center", "pos-right", "is-hidden"];
        const total = wraps.length;
        let activeIndex = total > 1 ? 1 : 0;
        let pointerId = null;
        let dragStartX = 0;
        let dragDeltaX = 0;
        let isDragging = false;
        let moved = false;
        let dragOffset = 0;

        function getLoopedIndex(index) {
          if (total === 0) return 0;
          return (index + total) % total;
        }

        function getCardTitle(index) {
          const wrap = wraps[index];
          if (!wrap) return "";
          return (
            wrap.getAttribute("data-title") ||
            wrap.querySelector("img")?.getAttribute("alt") ||
            ""
          );
        }

        function renderWelcomeCards() {
          if (!total) return;
          const leftIndex = getLoopedIndex(activeIndex - 1);
          const rightIndex = getLoopedIndex(activeIndex + 1);
          wraps.forEach((w, i) => {
            w.classList.remove(...positions);
            if (i === leftIndex) w.classList.add("pos-left");
            else if (i === activeIndex) w.classList.add("pos-center");
            else if (i === rightIndex) w.classList.add("pos-right");
            else w.classList.add("is-hidden");
            w.style.transform = "translate(-50%, -50%)";
          });
          if (titlePill) titlePill.textContent = getCardTitle(activeIndex);
        }

        function applyDragOffset(offsetX) {
          const leftIndex = getLoopedIndex(activeIndex - 1);
          const rightIndex = getLoopedIndex(activeIndex + 1);
          [leftIndex, activeIndex, rightIndex].forEach((idx) => {
            const wrap = wraps[idx];
            if (!wrap) return;
            wrap.style.transform = `translate(calc(-50% + ${offsetX}px), -50%)`;
          });
        }

        function nextCard() {
          activeIndex = getLoopedIndex(activeIndex + 1);
          renderWelcomeCards();
        }

        function prevCard() {
          activeIndex = getLoopedIndex(activeIndex - 1);
          renderWelcomeCards();
        }

        function centerCardByIndex(index) {
          if (index === activeIndex) return;
          if (index === getLoopedIndex(activeIndex - 1)) prevCard();
          else if (index === getLoopedIndex(activeIndex + 1)) nextCard();
          else {
            activeIndex = index;
            renderWelcomeCards();
          }
        }

        function onPointerDown(e) {
          if (!carousel) return;
          if (e.pointerType === "mouse" && e.button !== 0) return;
          e.preventDefault();
          pointerId = e.pointerId;
          carousel.setPointerCapture(pointerId);
          isDragging = true;
          carousel.classList.add("is-dragging");
          moved = false;
          dragStartX = e.clientX;
          dragDeltaX = 0;
          dragOffset = 0;
        }

        function onPointerMove(e) {
          if (!isDragging || (pointerId !== null && e.pointerId !== pointerId))
            return;
          e.preventDefault();
          dragDeltaX = e.clientX - dragStartX;
          dragOffset = dragDeltaX * 0.6;
          if (Math.abs(dragDeltaX) > 6) moved = true;
          applyDragOffset(dragOffset);
        }

        function onPointerUp() {
          if (!isDragging) return;
          isDragging = false;
          carousel?.classList.remove("is-dragging");
          if (carousel && pointerId !== null) {
            try {
              carousel.releasePointerCapture(pointerId);
            } catch {}
          }
          pointerId = null;
          const threshold = 22;
          if (dragDeltaX <= -threshold) nextCard();
          else if (dragDeltaX >= threshold) prevCard();
          else renderWelcomeCards();
          dragDeltaX = 0;
          dragOffset = 0;
        }

        carousel?.addEventListener("pointerdown", onPointerDown);
        window.addEventListener("pointermove", onPointerMove);
        window.addEventListener("pointerup", onPointerUp);
        window.addEventListener("pointercancel", onPointerUp);

        wraps.forEach((wrap, index) => {
          wrap.addEventListener("click", () => {
            if (moved) return;
            centerCardByIndex(index);
          });
        });

        renderWelcomeCards();

        const SIMILARITY_THRESHOLD = 85;
        const SOFTNESS = 22;
        const GREEN_DOMINANCE = 35;
        const FALLBACK_GREEN = { r: 0, g: 255, b: 0 };

        function detectGreenReference(ctx, width, height) {
          const imageData = ctx.getImageData(0, 0, width, height);
          const data = imageData.data;
          let sumR = 0,
            sumG = 0,
            sumB = 0,
            count = 0;
          const borderTop = Math.floor(height * 0.08);
          const borderBottom = Math.floor(height * 0.92);
          const borderLeft = Math.floor(width * 0.08);
          const borderRight = Math.floor(width * 0.92);
          for (let y = 0; y < height; y++) {
            for (let x = 0; x < width; x++) {
              if (
                y < borderTop ||
                y > borderBottom ||
                x < borderLeft ||
                x > borderRight
              ) {
                const i = (y * width + x) * 4;
                const r = data[i],
                  g = data[i + 1],
                  b = data[i + 2];
                if (g > r && g > b && g - r > 30 && g - b > 30) {
                  sumR += r;
                  sumG += g;
                  sumB += b;
                  count++;
                }
              }
            }
          }
          if (count < 80) return null;
          return { r: sumR / count, g: sumG / count, b: sumB / count };
        }

        function applyAdaptiveChroma(ctx, width, height, ref) {
          const imageData = ctx.getImageData(0, 0, width, height);
          const data = imageData.data;
          for (let i = 0; i < data.length; i += 4) {
            const r = data[i],
              g = data[i + 1],
              b = data[i + 2];
            const isGreenBg =
              g > r && g > b && g - Math.min(r, b) >= GREEN_DOMINANCE;
            if (!isGreenBg) {
              data[i + 3] = 255;
              continue;
            }
            const d = Math.sqrt(
              Math.pow(r - ref.r, 2) +
                Math.pow(g - ref.g, 2) +
                Math.pow(b - ref.b, 2),
            );
            const edgeStart = SIMILARITY_THRESHOLD - SOFTNESS;
            const edgeEnd = SIMILARITY_THRESHOLD;
            let alpha = 1.0;
            if (d < edgeStart) alpha = 0;
            else if (d < edgeEnd) alpha = (d - edgeStart) / SOFTNESS;
            if (alpha < 0.5) data[i + 1] = Math.min(g, Math.floor((r + b) / 2));
            data[i + 3] = Math.round(alpha * 255);
          }
          ctx.putImageData(imageData, 0, 0);
        }

        let evaChromaRunning = false;
        let evaChromaRef = null;

        function processEvaStatic() {
          const img = document.getElementById("eva-static-source");
          const outputCanvas = document.getElementById("eva-static-canvas");
          if (!img || !outputCanvas || !img.complete || img.naturalWidth === 0)
            return;
          const w = img.naturalWidth,
            h = img.naturalHeight;
          const workCanvas = document.createElement("canvas");
          workCanvas.width = w;
          workCanvas.height = h;
          const wCtx = workCanvas.getContext("2d", {
            willReadFrequently: true,
          });
          const oCtx = outputCanvas.getContext("2d", {
            willReadFrequently: true,
          });
          if (!wCtx || !oCtx) return;
          outputCanvas.width = w;
          outputCanvas.height = h;
          wCtx.drawImage(img, 0, 0);
          const ref = detectGreenReference(wCtx, w, h) || FALLBACK_GREEN;
          applyAdaptiveChroma(wCtx, w, h, ref);
          const scale = 0.83;
          const dw = w * scale,
            dh = h * scale;
          const ox = (w - dw) / 2,
            oy = (h - dh) / 2;
          oCtx.clearRect(0, 0, w, h);
          oCtx.drawImage(workCanvas, 0, 0, w, h, ox, oy, dw, dh);
        }

        function processEvaChroma() {
          const source = document.getElementById("eva-chroma-source");
          const workCanvas = document.getElementById("eva-chroma-canvas");
          const outputCanvas = document.getElementById("eva-canvas");
          if (
            !source ||
            !workCanvas ||
            !outputCanvas ||
            source.paused ||
            source.ended
          ) {
            if (evaChromaRunning) requestAnimationFrame(processEvaChroma);
            return;
          }
          const wCtx = workCanvas.getContext("2d", {
            willReadFrequently: true,
          });
          const oCtx = outputCanvas.getContext("2d", {
            willReadFrequently: true,
          });
          if (!wCtx || !oCtx) return;
          if (
            workCanvas.width !== source.videoWidth ||
            workCanvas.height !== source.videoHeight
          ) {
            if (source.videoWidth > 0 && source.videoHeight > 0) {
              workCanvas.width = source.videoWidth;
              workCanvas.height = source.videoHeight;
              outputCanvas.width = source.videoWidth;
              outputCanvas.height = source.videoHeight;
              evaChromaRef = null;
            }
          }
          if (workCanvas.width > 0 && workCanvas.height > 0) {
            wCtx.drawImage(source, 0, 0);
            if (!evaChromaRef)
              evaChromaRef =
                detectGreenReference(
                  wCtx,
                  workCanvas.width,
                  workCanvas.height,
                ) || FALLBACK_GREEN;
            applyAdaptiveChroma(
              wCtx,
              workCanvas.width,
              workCanvas.height,
              evaChromaRef,
            );
            const scale = 0.83;
            const dw = workCanvas.width * scale,
              dh = workCanvas.height * scale;
            const ox = (workCanvas.width - dw) / 2,
              oy = (workCanvas.height - dh) / 2;
            oCtx.clearRect(0, 0, outputCanvas.width, outputCanvas.height);
            oCtx.drawImage(
              workCanvas,
              0,
              0,
              workCanvas.width,
              workCanvas.height,
              ox,
              oy,
              dw,
              dh,
            );
          }
          if (evaChromaRunning) requestAnimationFrame(processEvaChroma);
        }

        window.startEvaChromaProcess = function () {
          evaChromaRunning = true;
          evaChromaRef = null;
          document.querySelector(".eva-agent-layer")?.classList.add("live");
          document
            .querySelector(".eva-static-layer")
            ?.classList.add("agent-active");
          processEvaChroma();
        };

        window.stopEvaChromaProcess = function () {
          evaChromaRunning = false;
          document.querySelector(".eva-agent-layer")?.classList.remove("live");
          document
            .querySelector(".eva-static-layer")
            ?.classList.remove("agent-active");
          processEvaStatic();
        };

        const staticImg = document.getElementById("eva-static-source");
        if (staticImg) {
          if (staticImg.complete) processEvaStatic();
          else staticImg.onload = processEvaStatic;
        }
      })();
    </script>
    <script type="module" src="/face-scan-camera.js"></script>
    <script src="./demo.ts" type="module"></script>
  </body>
</html>
